---
- name: Verify
  hosts: pki-agent
  gather_facts: false
  tasks:
    - name: Check bao binary exists and is executable
      ansible.builtin.stat:
        path: /usr/bin/bao
      register: _bao_bin
      failed_when: not _bao_bin.stat.exists or not _bao_bin.stat.executable

    - name: Check agent config file exists
      ansible.builtin.stat:
        path: /etc/openbao-agent.d/agent.hcl
      register: _agent_hcl
      failed_when: not _agent_hcl.stat.exists

    - name: Check agent config owned by openbao-agent user
      ansible.builtin.assert:
        that:
          - _agent_hcl.stat.pw_name == 'openbao-agent'
        fail_msg: "agent.hcl not owned by openbao-agent user"

    - name: Verify config uses bao stanza
      ansible.builtin.command:
        cmd: grep -c '^bao {' /etc/openbao-agent.d/agent.hcl
      register: _bao_stanza
      changed_when: false
      failed_when: _bao_stanza.stdout | int < 1

    - name: Check systemd service is enabled and running
      ansible.builtin.systemd:
        name: openbao-agent
      register: _svc
      failed_when: >
        _svc.status.ActiveState != 'active' or
        _svc.status.UnitFileState not in ['enabled', 'static']

    - name: Check node cert exists with correct mode
      ansible.builtin.stat:
        path: /etc/pki-agent-test/node.crt
      register: _node_cert
      failed_when: >
        not _node_cert.stat.exists or
        _node_cert.stat.mode != '0644'

    - name: Check node key exists with correct mode
      ansible.builtin.stat:
        path: /etc/pki-agent-test/node.key
      register: _node_key
      failed_when: >
        not _node_key.stat.exists or
        _node_key.stat.mode != '0600'

    - name: Check CA cert exists
      ansible.builtin.stat:
        path: /etc/pki-agent-test/ca.crt
      register: _ca_cert
      failed_when: not _ca_cert.stat.exists

    - name: Check client cert exists
      ansible.builtin.stat:
        path: /etc/pki-agent-test/client.crt
      register: _client_cert
      failed_when: not _client_cert.stat.exists

    - name: Check client key exists with correct mode
      ansible.builtin.stat:
        path: /etc/pki-agent-test/client.key
      register: _client_key
      failed_when: >
        not _client_key.stat.exists or
        _client_key.stat.mode != '0600'

    - name: Verify agent.hcl contains both certificate template blocks
      ansible.builtin.command:
        cmd: grep -c 'pkiCert' /etc/openbao-agent.d/agent.hcl
      register: _pkiCert_count
      changed_when: false
      failed_when: _pkiCert_count.stdout | int < 2

    - name: Verify exec stanza present for node-cert (has reload_command)
      ansible.builtin.command:
        cmd: grep -c 'cert-rotated' /etc/openbao-agent.d/agent.hcl
      register: _exec_stanza
      changed_when: false
      failed_when: _exec_stanza.stdout | int < 1

    - name: Verify no exec stanza for client-cert (reload_command is empty)
      ansible.builtin.shell:
        cmd: |
          python3 -c "
          import re, sys
          content = open('/etc/openbao-agent.d/agent.hcl').read()
          blocks = re.findall(r'# Certificate: client-cert.*?(?=# Certificate:|$)', content, re.DOTALL)
          if not blocks:
              sys.exit(1)
          if 'exec {' in blocks[0]:
              sys.exit(1)
          sys.exit(0)
          "
      changed_when: false

# code: language=ansible
