---
dependency:
  name: galaxy
  options:
    ignore-errors: true
driver:
  name: docker
platforms:
  - name: ${MOLECULE_INSTANCE_NAME:-"pki-agent-openbao"}
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-rockylinux9}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    networks:
      - name: openbao-net
  - name: openbao-dev
    image: openbao/openbao:latest
    env:
      BAO_DEV_ROOT_TOKEN_ID: molecule-root-token
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: server -dev
    published_ports:
      - "8200/tcp"
    networks:
      - name: openbao-net
    pre_build_image: true

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  env:
    VAULT_ADDR: "http://openbao-dev:8200"
    VAULT_TOKEN: molecule-root-token
