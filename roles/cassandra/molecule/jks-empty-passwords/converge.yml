---
- name: Converge — cassandra role with JKS TLS, empty passwords (edge case)
  hosts: all
  vars:
    cassandra_version: "5.0.7"
    cassandra_start_on_install: false
    cassandra_install_format: tar
    cassandra_cluster_name: jks-empty-passwords-test
    cassandra_seeds: "127.0.0.1"
    cassandra_dc: dc1
    cassandra_rack: rack1
    cassandra_max_heap_size: 512M

    cassandra_ssl_keystore_password_file: /etc/cassandra/server_keystore_passwordfile.txt
    cassandra_ssl_truststore_password_file: /etc/cassandra/server_truststore_passwordfile.txt
    cassandra_ssl_client_keystore_password_file: /etc/cassandra/client_keystore_passwordfile.txt
    cassandra_ssl_client_truststore_password_file: /etc/cassandra/client_truststore_passwordfile.txt

    cassandra_ssl_internode_encryption: all
    cassandra_ssl_internode_keystore_file: /etc/cassandra/keystore.jks
    cassandra_ssl_truststore_file: /etc/cassandra/truststore.jks
    # Passwords intentionally empty/unset — role must NOT write empty password files
    cassandra_ssl_keystore_pass: ""
    cassandra_ssl_truststore_pass: ""

    cassandra_ssl_client_encryption_enabled: true
    cassandra_ssl_client_keystore_file: /etc/cassandra/keystore.jks
    cassandra_ssl_client_truststore_file: /etc/cassandra/truststore.jks
    cassandra_ssl_client_keystore_pass: ""
    cassandra_ssl_client_truststore_pass: ""

  pre_tasks:
    - name: Workaround missing man1 dir in test containers
      ansible.builtin.file:
        path: /usr/share/man/man1/
        state: directory
        recurse: true
        mode: "0755"

  roles:
    - role: axonops.axonops.cassandra

  post_tasks:
    - name: Record cassandra_conf_dir for verify play
      ansible.builtin.copy:
        content: "{{ cassandra_conf_dir }}"
        dest: /tmp/cassandra_conf_dir
        mode: '0644'
