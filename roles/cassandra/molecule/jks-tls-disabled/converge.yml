---
- name: Converge — cassandra role with TLS disabled (default cassandra_use_password_files)
  hosts: all
  vars:
    cassandra_version: "5.0.5"
    cassandra_start_on_install: false
    cassandra_install_format: pkg
    cassandra_cluster_name: jks-tls-disabled-test
    cassandra_seeds: "127.0.0.1"

    # TLS disabled — password file machinery must remain dormant
    cassandra_ssl_internode_encryption: none
    cassandra_ssl_client_encryption_enabled: false

  roles:
    - role: axonops.axonops.cassandra
