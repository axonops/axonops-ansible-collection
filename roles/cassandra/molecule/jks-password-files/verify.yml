---
# BDD verification — JKS TLS password files (default behavior)
#
# Behaviour under test: when JKS TLS is enabled and cassandra_use_password_files
# is left at its default (true), Cassandra's keystore/truststore passwords are
# externalised to mode 0600 files referenced by *_password_file: keys in
# cassandra.yaml — for BOTH server_encryption_options and client_encryption_options.
#
# Why placeholder JKS files: prepare.yml writes empty keystore.jks/truststore.jks
# to satisfy the role's file-existence checks. Cassandra is never started
# (cassandra_start_on_install: false in converge.yml), so JKS content is not parsed.
#
# Isolation: each molecule scenario runs in its own container — parallel-safe.

- name: Verify JKS TLS uses password files by default (BDD)
  hosts: all
  gather_facts: false
  vars:
    keystore_passwordfile: /etc/cassandra/keystore_passwordfile.txt
    truststore_passwordfile: /etc/cassandra/truststore_passwordfile.txt
  tasks:

    # ---------- GIVEN: role completed with default cassandra_use_password_files ----------

    - name: GIVEN — read rendered cassandra.yaml
      ansible.builtin.slurp:
        src: /etc/cassandra/cassandra.yaml
      register: cassandra_yaml_raw

    - name: GIVEN — decode cassandra.yaml
      ansible.builtin.set_fact:
        cassandra_yaml: "{{ cassandra_yaml_raw.content | b64decode }}"

    # Extract server_encryption_options and client_encryption_options blocks
    # separately so assertions target the correct block (Rule 3 / Rule 1).
    - name: GIVEN — extract server_encryption_options block
      ansible.builtin.set_fact:
        server_enc_block: "{{ cassandra_yaml | regex_search('(?s)^server_encryption_options:.*?(?=^\\S)', multiline=True) | default('', true) }}"

    - name: GIVEN — extract client_encryption_options block
      ansible.builtin.set_fact:
        client_enc_block: "{{ cassandra_yaml | regex_search('(?s)^client_encryption_options:.*?(?=^\\S)', multiline=True) | default('', true) }}"

    - name: GIVEN — both encryption blocks were found
      ansible.builtin.assert:
        that:
          - server_enc_block | length > 0
          - client_enc_block | length > 0
        fail_msg: "could not isolate server/client encryption blocks from cassandra.yaml"

    # ---------- THEN: password files exist with secure permissions ----------

    - name: THEN — keystore password file exists
      ansible.builtin.stat:
        path: "{{ keystore_passwordfile }}"
      register: keystore_pf

    - name: THEN — keystore password file is mode 0600, owned by cassandra
      ansible.builtin.assert:
        that:
          - keystore_pf.stat.exists
          - keystore_pf.stat.mode == '0600'
          - keystore_pf.stat.pw_name == 'cassandra'
          - keystore_pf.stat.gr_name == 'cassandra'
        fail_msg: "keystore password file missing or insecure: {{ keystore_pf.stat }}"

    - name: THEN — truststore password file exists
      ansible.builtin.stat:
        path: "{{ truststore_passwordfile }}"
      register: truststore_pf

    - name: THEN — truststore password file is mode 0600, owned by cassandra
      ansible.builtin.assert:
        that:
          - truststore_pf.stat.exists
          - truststore_pf.stat.mode == '0600'
          - truststore_pf.stat.pw_name == 'cassandra'
          - truststore_pf.stat.gr_name == 'cassandra'
        fail_msg: "truststore password file missing or insecure: {{ truststore_pf.stat }}"

    - name: THEN — keystore password file content matches configured password
      ansible.builtin.slurp:
        src: "{{ keystore_passwordfile }}"
      register: keystore_pf_content
      no_log: true

    - name: THEN — keystore password file content equals serverKeystorePass!
      ansible.builtin.assert:
        that:
          - (keystore_pf_content.content | b64decode | trim) == 'serverKeystorePass!'
        fail_msg: "keystore password file content mismatch"
      no_log: true

    # ---------- THEN: server_encryption_options uses *_password_file ----------

    - name: THEN — server_encryption_options contains keystore_password_file
      ansible.builtin.assert:
        that:
          - server_enc_block is search('(?m)^\s+keystore_password_file:\s+' ~ (keystore_passwordfile | regex_escape))
        fail_msg: "keystore_password_file not rendered in server_encryption_options"

    - name: THEN — server_encryption_options contains truststore_password_file
      ansible.builtin.assert:
        that:
          - server_enc_block is search('(?m)^\s+truststore_password_file:\s+' ~ (truststore_passwordfile | regex_escape))
        fail_msg: "truststore_password_file not rendered in server_encryption_options"

    - name: THEN — server_encryption_options has no inline keystore_password
      ansible.builtin.assert:
        that:
          - server_enc_block is not search('(?m)^\s+keystore_password:\s')
        fail_msg: "inline keystore_password: found in server_encryption_options"

    - name: THEN — server_encryption_options has no inline truststore_password
      ansible.builtin.assert:
        that:
          - server_enc_block is not search('(?m)^\s+truststore_password:\s')
        fail_msg: "inline truststore_password: found in server_encryption_options"

    # ---------- THEN: client_encryption_options uses *_password_file ----------

    - name: THEN — client_encryption_options contains keystore_password_file
      ansible.builtin.assert:
        that:
          - client_enc_block is search('(?m)^\s+keystore_password_file:\s+' ~ (keystore_passwordfile | regex_escape))
        fail_msg: "keystore_password_file not rendered in client_encryption_options"

    - name: THEN — client_encryption_options contains truststore_password_file
      ansible.builtin.assert:
        that:
          - client_enc_block is search('(?m)^\s+truststore_password_file:\s+' ~ (truststore_passwordfile | regex_escape))
        fail_msg: "truststore_password_file not rendered in client_encryption_options"

    - name: THEN — client_encryption_options has no inline keystore_password
      ansible.builtin.assert:
        that:
          - client_enc_block is not search('(?m)^\s+keystore_password:\s')
        fail_msg: "inline keystore_password: found in client_encryption_options"

    - name: THEN — client_encryption_options has no inline truststore_password
      ansible.builtin.assert:
        that:
          - client_enc_block is not search('(?m)^\s+truststore_password:\s')
        fail_msg: "inline truststore_password: found in client_encryption_options"
