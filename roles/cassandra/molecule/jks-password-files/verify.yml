---
- name: Verify JKS TLS uses password files by default (BDD)
  hosts: all
  gather_facts: false
  vars:
    keystore_passwordfile: /etc/cassandra/keystore_passwordfile.txt
    truststore_passwordfile: /etc/cassandra/truststore_passwordfile.txt
  tasks:

    # ---------- GIVEN: role completed with default cassandra_use_password_files ----------

    - name: GIVEN — read rendered cassandra.yaml
      ansible.builtin.slurp:
        src: /etc/cassandra/cassandra.yaml
      register: cassandra_yaml_raw

    - name: GIVEN — decode cassandra.yaml
      ansible.builtin.set_fact:
        cassandra_yaml: "{{ cassandra_yaml_raw.content | b64decode }}"

    # ---------- THEN: password files exist with secure permissions ----------

    - name: THEN — keystore password file exists
      ansible.builtin.stat:
        path: "{{ keystore_passwordfile }}"
      register: keystore_pf

    - name: THEN — keystore password file is mode 0600, owned by cassandra
      ansible.builtin.assert:
        that:
          - keystore_pf.stat.exists
          - keystore_pf.stat.mode == '0600'
          - keystore_pf.stat.pw_name == 'cassandra'
          - keystore_pf.stat.gr_name == 'cassandra'
        fail_msg: "keystore password file missing or insecure: {{ keystore_pf.stat }}"

    - name: THEN — truststore password file exists
      ansible.builtin.stat:
        path: "{{ truststore_passwordfile }}"
      register: truststore_pf

    - name: THEN — truststore password file is mode 0600, owned by cassandra
      ansible.builtin.assert:
        that:
          - truststore_pf.stat.exists
          - truststore_pf.stat.mode == '0600'
          - truststore_pf.stat.pw_name == 'cassandra'
          - truststore_pf.stat.gr_name == 'cassandra'
        fail_msg: "truststore password file missing or insecure: {{ truststore_pf.stat }}"

    - name: THEN — keystore password file content matches configured password
      ansible.builtin.slurp:
        src: "{{ keystore_passwordfile }}"
      register: keystore_pf_content
      no_log: true

    - name: THEN — keystore password file content equals serverKeystorePass!
      ansible.builtin.assert:
        that:
          - (keystore_pf_content.content | b64decode | trim) == 'serverKeystorePass!'
        fail_msg: "keystore password file content mismatch"
      no_log: true

    # ---------- THEN: cassandra.yaml uses *_password_file keys ----------

    - name: THEN — cassandra.yaml emits keystore_password_file under server_encryption_options
      ansible.builtin.assert:
        that:
          - cassandra_yaml is search('(?m)^\s+keystore_password_file:\s+' ~ (keystore_passwordfile | regex_escape))
        fail_msg: "keystore_password_file not rendered in cassandra.yaml"

    - name: THEN — cassandra.yaml emits truststore_password_file under server_encryption_options
      ansible.builtin.assert:
        that:
          - cassandra_yaml is search('(?m)^\s+truststore_password_file:\s+' ~ (truststore_passwordfile | regex_escape))
        fail_msg: "truststore_password_file not rendered in cassandra.yaml"

    # ---------- THEN: cassandra.yaml does NOT emit inline password keys ----------

    - name: THEN — cassandra.yaml has no inline keystore_password key
      ansible.builtin.assert:
        that:
          - cassandra_yaml is not search('(?m)^\s+keystore_password:\s')
        fail_msg: "inline keystore_password: found — should use keystore_password_file by default"

    - name: THEN — cassandra.yaml has no inline truststore_password key
      ansible.builtin.assert:
        that:
          - cassandra_yaml is not search('(?m)^\s+truststore_password:\s')
        fail_msg: "inline truststore_password: found — should use truststore_password_file by default"

    # ---------- THEN: client_encryption_options also uses password files ----------
    # The client encryption block appears later in the file; assert at least two
    # occurrences of *_password_file keys (server + client).

    - name: THEN — keystore_password_file rendered for both server and client encryption
      ansible.builtin.assert:
        that:
          - cassandra_yaml | regex_findall('(?m)^\s+keystore_password_file:') | length >= 2
        fail_msg: "keystore_password_file missing from one of server_encryption_options / client_encryption_options"

    - name: THEN — truststore_password_file rendered for both server and client encryption
      ansible.builtin.assert:
        that:
          - cassandra_yaml | regex_findall('(?m)^\s+truststore_password_file:') | length >= 2
        fail_msg: "truststore_password_file missing from one of server_encryption_options / client_encryption_options"

    # ---------- THEN: idempotency ----------

    - name: WHEN — re-run role to check idempotency
      ansible.builtin.import_role:
        name: axonops.axonops.cassandra
      vars:
        cassandra_version: "5.0.5"
        cassandra_start_on_install: false
        cassandra_install_format: pkg
        cassandra_cluster_name: jks-password-files-test
        cassandra_seeds: "127.0.0.1"
        cassandra_ssl_internode_encryption: all
        cassandra_ssl_internode_keystore_file: /etc/cassandra/keystore.jks
        cassandra_ssl_keystore_pass: "serverKeystorePass!"
        cassandra_ssl_truststore_file: /etc/cassandra/truststore.jks
        cassandra_ssl_truststore_pass: "serverTruststorePass!"
        cassandra_ssl_client_encryption_enabled: true
        cassandra_ssl_client_keystore_file: /etc/cassandra/keystore.jks
        cassandra_ssl_client_keystore_pass: "clientKeystorePass!"
        cassandra_ssl_client_truststore_file: /etc/cassandra/truststore.jks
        cassandra_ssl_client_truststore_pass: "clientTruststorePass!"
