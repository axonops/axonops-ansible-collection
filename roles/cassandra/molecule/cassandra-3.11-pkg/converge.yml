---
- name: Converge — Cassandra 3.11 RedHat pkg install (regression test for #124)
  hosts: all
  vars:
    cassandra_cluster_name: cassandra-3-11-pkg
    cassandra_dc: dc1
    cassandra_rack: rack1
    cassandra_max_heap_size: 512M
    # The jFrog 311x mirror only indexes the latest 3.11.x point release —
    # bump this when upstream cuts a new one, or the install will 404.
    cassandra_version: 3.11.19
    cassandra_start_on_boot: false
    cassandra_start_on_install: false
    cassandra_install_format: pkg
    cassandra_seeds: "127.0.0.1"
    cassandra_cqlsh_venv_enabled: false
  pre_tasks:
    - name: Workaround missing man1 dir in test containers
      ansible.builtin.file:
        path: /usr/share/man/man1
        state: directory
        mode: "0755"
  roles:
    - role: java
      vars:
        java_use_zulu: true
    - role: cassandra
