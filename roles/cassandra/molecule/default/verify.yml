---
# BDD verification — data directory migration guard
#
# Behaviour under test: the role MUST refuse to run when the configured
# cassandra_data_directory contains no 'system' keyspace directory while the
# parent directory does (data laid out with the pre-0.6.0 default), MUST pass
# on a fresh install, and MUST allow bypassing the guard with
# cassandra_data_directory_check: false.

- name: Verify data directory migration guard (BDD)
  hosts: all
  gather_facts: false
  tasks:

    - name: GIVEN — a fresh install converged with the 0.6 default layout
      ansible.builtin.stat:
        path: /var/lib/cassandra/data
      register: verify_data_dir

    - name: THEN — the configured data directory exists
      ansible.builtin.assert:
        that:
          - verify_data_dir.stat.exists
          - verify_data_dir.stat.isdir

    - name: WHEN — the guard runs against the fresh install layout
      ansible.builtin.include_tasks: ../../tasks/check-data-dir.yml
      vars:
        cassandra_data_directory: /var/lib/cassandra/data
        cassandra_data_directory_check: true

    - name: GIVEN — an unmigrated pre-0.6 layout under a scratch directory
      ansible.builtin.file:
        path: /tmp/guard-test/system
        state: directory
        mode: "0750"

    - name: WHEN — the guard runs against the unmigrated layout
      block:
        - name: Include the data directory guard against the unmigrated layout
          ansible.builtin.include_tasks: ../../tasks/check-data-dir.yml
          vars:
            cassandra_data_directory: /tmp/guard-test/data
            cassandra_data_directory_check: true
      rescue:
        - name: Record that the guard failed
          ansible.builtin.set_fact:
            guard_failed: true

    - name: THEN — the guard fails the play on the unmigrated layout
      ansible.builtin.assert:
        that:
          - guard_failed | default(false) | bool
        fail_msg: data directory guard did not fail on an unmigrated layout

    - name: WHEN — the guard is disabled on the unmigrated layout
      ansible.builtin.include_tasks: ../../tasks/check-data-dir.yml
      vars:
        cassandra_data_directory: /tmp/guard-test/data
        cassandra_data_directory_check: false

    - name: Clean up scratch directory
      ansible.builtin.file:
        path: /tmp/guard-test
        state: absent

# BDD verification — cqlsh virtual environment
#
# Behaviour under test: with cassandra_cqlsh_venv_enabled (the default), the role
# MUST provision an isolated venv containing a working cqlsh and a wrapper that
# launches it, so cqlsh runs even where the system Python is >= 3.12 (Ubuntu
# 24.04 / Debian 13).
- name: Verify cqlsh virtual environment (BDD)
  hosts: all
  gather_facts: false
  vars:
    cassandra_cqlsh_venv_path: /opt/cassandra-cqlsh-venv
    cassandra_cqlsh_wrapper_path: /usr/local/bin/cqlsh
  tasks:

    - name: GIVEN — the role converged with the cqlsh venv enabled
      ansible.builtin.stat:
        path: "{{ cassandra_cqlsh_venv_path }}/bin/cqlsh"
      register: verify_venv_cqlsh

    - name: THEN — the venv contains a cqlsh entry point
      ansible.builtin.assert:
        that:
          - verify_venv_cqlsh.stat.exists
        fail_msg: cqlsh was not installed into {{ cassandra_cqlsh_venv_path }}

    - name: GIVEN — the wrapper was installed
      ansible.builtin.stat:
        path: "{{ cassandra_cqlsh_wrapper_path }}"
      register: verify_wrapper

    - name: THEN — the wrapper exists and is executable
      ansible.builtin.assert:
        that:
          - verify_wrapper.stat.exists
          - verify_wrapper.stat.mode == '0755'
        fail_msg: cqlsh wrapper missing or not executable at {{ cassandra_cqlsh_wrapper_path }}

    - name: WHEN — cqlsh is launched through the wrapper on a modern-Python host
      ansible.builtin.command: "{{ cassandra_cqlsh_wrapper_path }} --version"
      register: verify_cqlsh_version
      changed_when: false

    - name: THEN — cqlsh starts without a Python import error and reports its version
      ansible.builtin.assert:
        that:
          - verify_cqlsh_version.rc == 0
          - "'cqlsh' in (verify_cqlsh_version.stdout + verify_cqlsh_version.stderr)"
        fail_msg: >-
          cqlsh failed to launch from the venv
          (stdout={{ verify_cqlsh_version.stdout }},
           stderr={{ verify_cqlsh_version.stderr | default('') }})
