---
- name: Generate test PEM fixtures
  hosts: all
  gather_facts: false
  tasks:
    - name: Install openssl
      ansible.builtin.package:
        name: openssl
        state: present

    # PEMBasedSslContextFactory requires PKCS#8 format (BEGIN PRIVATE KEY).
    # openssl req -newkey produces PKCS#1 (BEGIN RSA PRIVATE KEY) — not accepted.
    - name: Generate PKCS#8 private key
      ansible.builtin.command: >-
        openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048
        -out /tmp/test.key
      args:
        creates: /tmp/test.key

    - name: Generate self-signed certificate
      ansible.builtin.command: >-
        openssl req -new -x509 -key /tmp/test.key -out /tmp/test.crt
        -days 1 -subj "/CN=cassandra-pem-tls-test"
      args:
        creates: /tmp/test.crt
