- name: Set config directory if not set (Debian)
  tags: always
  when: ansible_os_family == "Debian"
  ansible.builtin.set_fact:
    cassandra_conf_dir: "/etc/cassandra"

- name: Set config directory if not set (RedHat)
  tags: always
  when: ansible_os_family == "RedHat"
  ansible.builtin.set_fact:
    cassandra_conf_dir: "/etc/cassandra/conf"

- name: Set up repos Debian
  when: ansible_os_family == 'Debian'
  block:
    - name: Set up Cassandra apt repos
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/cassandra.list
        content: |
          deb [signed-by=/etc/apt/keyrings/apache-cassandra.asc] https://debian.cassandra.apache.org 41x main
          deb [signed-by=/etc/apt/keyrings/apache-cassandra.asc] https://debian.cassandra.apache.org 50x main
        mode: "0644"

    - name: Ensure /etc/apt/keyrings exists
      ansible.builtin.file:
        state: directory
        mode: "0755"
        path: /etc/apt/keyrings

    - name: GPG key for Cassandra
      ansible.builtin.get_url:
        url: https://downloads.apache.org/cassandra/KEYS
        dest: /etc/apt/keyrings/apache-cassandra.asc
        mode: "0644"

    - name: Set pkg name
      ansible.builtin.set_fact:
        cassandra_pkg: "cassandra={{ cassandra_version }}"

- name: Set up repos Redhat
  when: ansible_os_family == 'RedHat'
  block:
    - name: Check if Apache Cassandra GPG key file already exists
      ansible.builtin.stat:
        path: /etc/pki/rpm-gpg/RPM-GPG-KEY-apache-cassandra
      register: cassandra_gpg_key_file

    - name: Import Apache Cassandra GPG keys
      when: not cassandra_gpg_key_file.stat.exists
      block:
        - name: Create temp file for Apache Cassandra GPG keys
          ansible.builtin.tempfile:
            state: file
            suffix: cassandra-keys
          register: cassandra_gpg_keys_tmpfile

        - name: Download Apache Cassandra GPG keys
          ansible.builtin.get_url:
            url: https://downloads.apache.org/cassandra/KEYS
            dest: "{{ cassandra_gpg_keys_tmpfile.path }}"
            mode: "0644"
            # Without force, get_url sends If-Modified-Since based on the
            # fresh empty tempfile's mtime, gets a 304, and leaves it empty.
            force: true

        - name: Extract PGP key blocks to a persistent local keyring file
          # Apache's KEYS file mixes ASCII-armored key blocks with plain-text
          # fingerprint/signature listings between them. Two problems this
          # avoids by extracting only the BEGIN/END PGP PUBLIC KEY BLOCK
          # sections (the same approach rpm_key's own is_pubkey() regex
          # uses) into a file we keep on disk:
          #   1. Newer rpm (4.19+, e.g. RHEL/Rocky 10) refuses to import the
          #      raw file at all: "key 1 not an armored public key."
          #   2. dnf's own gpgkey= handling (used for repo_gpgcheck) fails
          #      to parse the raw file on the same rpm versions: "Parsing
          #      armored OpenPGP packet(s) failed." Pointing gpgkey= at this
          #      local cleaned file instead of the remote URL avoids dnf
          #      re-fetching and re-parsing the problematic raw file itself.
          ansible.builtin.shell:
            cmd: >-
              awk '/-----BEGIN PGP PUBLIC KEY BLOCK-----/,/-----END PGP PUBLIC KEY BLOCK-----/'
              {{ cassandra_gpg_keys_tmpfile.path | quote }} > /etc/pki/rpm-gpg/RPM-GPG-KEY-apache-cassandra
          changed_when: true
          # noqa: command-instead-of-module

        - name: Set permissions on Apache Cassandra GPG keyring file
          ansible.builtin.file:
            path: /etc/pki/rpm-gpg/RPM-GPG-KEY-apache-cassandra
            mode: "0644"

        - name: Import Apache Cassandra GPG key
          # ansible.builtin.rpm_key (both its URL-fetch and local-file import
          # paths) crashes decoding the raw KEYS file on ansible-core >=
          # 2.18: "'utf-8' codec can't decode byte 0xe9 ... invalid
          # continuation byte" — one contributor's comment is Latin-1, not
          # UTF-8. `rpm --import` itself handles the raw bytes fine, so it's
          # used directly here instead of the module.
          #
          # failed_when is relaxed because rpm 4.19+'s crypto policy can
          # reject individual legacy keys in the bundle ("Policy rejects
          # ...: No binding signature") with rc 2, while still importing
          # the keys actually needed to verify the repo. The subsequent
          # repo_gpgcheck at package-install time is the real correctness
          # gate — if the key that matters wasn't imported, that step fails
          # loudly instead of this one failing on an unrelated stale key.
          ansible.builtin.command:
            cmd: rpm --import /etc/pki/rpm-gpg/RPM-GPG-KEY-apache-cassandra
          changed_when: true
          failed_when: false
          # noqa: command-instead-of-module

        - name: Remove temp file for Apache Cassandra GPG keys
          ansible.builtin.file:
            path: "{{ cassandra_gpg_keys_tmpfile.path }}"
            state: absent

    - name: Set up Cassandra yum repos
      ansible.builtin.copy:
        dest: /etc/yum.repos.d/cassandra.repo
        mode: "0644"
        owner: root
        group: root
        content: |
          [cassandra311]
          name=Apache Cassandra 3.11
          baseurl={{ cassandra_redhat_repository_url_311x | default('https://apache.jfrog.io/artifactory/cassandra-rpm/311x/') }}
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-apache-cassandra

          [cassandra41]
          name=Apache Cassandra 4.1
          baseurl={{ cassandra_redhat_repository_url_41x | default('https://redhat.cassandra.apache.org/41x/') }}
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-apache-cassandra

          [cassandra50]
          name=Apache Cassandra 5.0
          baseurl={{ cassandra_redhat_repository_url_50x | default('https://redhat.cassandra.apache.org/50x/') }}
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-apache-cassandra

    - name: Set pkg name
      ansible.builtin.set_fact:
        cassandra_pkg: "cassandra-{{ cassandra_version }}-1"

- name: Install pre-reqs
  when: ansible_os_family == 'RedHat'
  ansible.builtin.package:
    name: chkconfig

- name: Install Cassandra
  ansible.builtin.package:
    update_cache: true
    name: "{{ cassandra_pkg }}"

- name: Prevent cassandra from being upgraded
  when: ansible_os_family == 'Debian'
  ansible.builtin.dpkg_selections:
    name: "cassandra"
    selection: hold

# code: language=ansible
