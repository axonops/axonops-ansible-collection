---
# Externalise JKS keystore/truststore passwords to mode 0600 files referenced
# from cassandra.yaml via *_password_file: keys. Skipped entirely when
# cassandra_use_password_files is false, when the relevant TLS path is off, or
# when the configured password is empty (writing an empty 0600 file would point
# cassandra.yaml at a file that does not authenticate anything).

- name: Write server keystore password file
  when:
    - cassandra_use_password_files | bool
    - cassandra_ssl_internode_encryption | default('none') != 'none'
    - (cassandra_ssl_keystore_pass | default('')) != ''
  ansible.builtin.copy:
    content: "{{ cassandra_ssl_keystore_pass }}"
    dest: "{{ cassandra_ssl_keystore_password_file }}"
    owner: cassandra
    group: cassandra
    mode: '0600'
  no_log: true
  notify: Restart Cassandra

- name: Write server truststore password file
  when:
    - cassandra_use_password_files | bool
    - cassandra_ssl_internode_encryption | default('none') != 'none'
    - (cassandra_ssl_truststore_pass | default('')) != ''
  ansible.builtin.copy:
    content: "{{ cassandra_ssl_truststore_pass }}"
    dest: "{{ cassandra_ssl_truststore_password_file }}"
    owner: cassandra
    group: cassandra
    mode: '0600'
  no_log: true
  notify: Restart Cassandra

- name: Write client keystore password file
  when:
    - cassandra_use_password_files | bool
    - cassandra_ssl_client_encryption_enabled | default(false) | bool
    - (cassandra_ssl_client_keystore_pass | default('')) != ''
  ansible.builtin.copy:
    content: "{{ cassandra_ssl_client_keystore_pass }}"
    dest: "{{ cassandra_ssl_client_keystore_password_file }}"
    owner: cassandra
    group: cassandra
    mode: '0600'
  no_log: true
  notify: Restart Cassandra

- name: Write client truststore password file
  when:
    - cassandra_use_password_files | bool
    - cassandra_ssl_client_encryption_enabled | default(false) | bool
    - (cassandra_ssl_client_truststore_pass | default('')) != ''
  ansible.builtin.copy:
    content: "{{ cassandra_ssl_client_truststore_pass }}"
    dest: "{{ cassandra_ssl_client_truststore_password_file }}"
    owner: cassandra
    group: cassandra
    mode: '0600'
  no_log: true
  notify: Restart Cassandra
