_cassandra_cqlsh_binary: |-
  {% if ansible_architecture == 'x86_64' %}
  https://github.com/axonops/cqlai/releases/download/v{{ cassandra_cqlsh_binary_version }}/cqlai_{{ cassandra_cqlsh_binary_version }}_amd64.deb
  {% elif ansible_architecture == 'aarch64' %}
  https://github.com/axonops/cqlai/releases/download/v{{ cassandra_cqlsh_binary_version }}/cqlai_{{ cassandra_cqlsh_binary_version }}_arm64.deb
  {% else %}
  https://github.com/axonops/cqlai/releases/download/v{{ cassandra_cqlsh_binary_version }}/cqlai_{{ cassandra_cqlsh_binary_version }}_{{ ansible_architecture }}.deb
  {% endif %}
