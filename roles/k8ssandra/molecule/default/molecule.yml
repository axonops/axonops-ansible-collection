---
dependency:
  name: galaxy
  options:
    ignore-errors: true
    requirements-file: requirements.yml
driver:
  name: default
platforms:
  - name: localhost
    managed: false
provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
  inventory:
    host_vars:
      localhost:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
verifier:
  name: ansible
