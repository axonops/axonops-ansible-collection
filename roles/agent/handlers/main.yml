---
- name: delete local.db
  file:
    path: /var/lib/axonops/local.db
    state: absent

- name: reload systemd
  systemd:
    daemon_reload: true

- name: Restart axon-agent
  systemd:
    name: axon-agent
    state: restarted
    daemon_reload: true

- name: Restart Cassandra
  ansible.builtin.systemd:
    state: restarted
    name: cassandra

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
