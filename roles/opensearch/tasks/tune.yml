---
- name: Set vm.max_map_count
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "{{ opensearch_vm_max_map_count }}"
    state: present

- name: Set fs.file-max
  ansible.posix.sysctl:
    name: fs.file-max
    value: "{{ opensearch_fs_file_max }}"
    state: present

# code: language=ansible
