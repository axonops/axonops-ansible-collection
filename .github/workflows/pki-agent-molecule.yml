---
name: PKI Agent Molecule

on:
  push:
    branches:
      - main
    paths:
      - 'roles/pki_agent/**'
      - '.github/workflows/pki-agent-molecule.yml'
  pull_request:
    paths:
      - 'roles/pki_agent/**'
      - '.github/workflows/pki-agent-molecule.yml'

defaults:
  run:
    working-directory: roles/pki_agent

jobs:
  molecule:
    name: Molecule PKI Agent (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro:
          - rockylinux9
          - rockylinux10
          - ubuntu2204
          - ubuntu2404
          - debian12

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies.
        run: pip3 install ansible molecule molecule-plugins[docker] docker

      - name: Run Molecule destroy (ignore failures)
        run: molecule -v destroy
        continue-on-error: true
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ANSIBLE_ROLES_PATH: $GITHUB_WORKSPACE/roles
          MOLECULE_INSTANCE_NAME: pki-agent-${{ matrix.distro }}

      - name: Run Molecule converge
        run: molecule -v converge
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ANSIBLE_ROLES_PATH: $GITHUB_WORKSPACE/roles
          MOLECULE_INSTANCE_NAME: pki-agent-${{ matrix.distro }}

      - name: Run Molecule verify
        run: molecule -v verify
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ANSIBLE_ROLES_PATH: $GITHUB_WORKSPACE/roles
          MOLECULE_INSTANCE_NAME: pki-agent-${{ matrix.distro }}

      - name: Run Molecule idempotence
        run: molecule -v idempotence
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ANSIBLE_ROLES_PATH: $GITHUB_WORKSPACE/roles
          MOLECULE_INSTANCE_NAME: pki-agent-${{ matrix.distro }}
