---
name: Apache Cassandra Molecule

on:
  push:
    branches:
      - main
    paths:
      - 'roles/cassandra/**'
      - '.github/workflows/cassandra-molecule.yml'
  pull_request:
    paths:
      - 'roles/cassandra/**'
      - '.github/workflows/cassandra-molecule.yml'

defaults:
  run:
    working-directory: roles/cassandra

jobs:
  molecule:
    name: Molecule Cassandra (${{ matrix.scenario }} / ${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - rockylinux9
          - rockylinux10
          - ubuntu2204
          - ubuntu2404
          - ubuntu2604
          - debian12
          - debian13
        scenario:
          - default
          - shenandoah
          - g1
          # - jks-password-files  # disabled: *_password_file keys require Cassandra 6.0+ (CASSANDRA-13428), unsupported by this role — see #102
          - jks-inline-password
          - jks-tls-disabled
          - jks-empty-passwords
          - cassandra-3.11

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies.
        run: pip3 install ansible molecule molecule-plugins[docker] docker

      - name: Run Molecule destroy (ignore failures)
        run: molecule -v destroy -s ${{ matrix.scenario }}
        continue-on-error: true
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ANSIBLE_ROLES_PATH: $GITHUB_WORKSPACE/roles
          MOLECULE_INSTANCE_NAME: cassandra-${{ matrix.scenario }}-${{ matrix.distro }}

      - name: Run Molecule converge
        run: molecule -v converge -s ${{ matrix.scenario }}
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ANSIBLE_ROLES_PATH: $GITHUB_WORKSPACE/roles
          MOLECULE_INSTANCE_NAME: cassandra-${{ matrix.scenario }}-${{ matrix.distro }}

      - name: Run Molecule verify
        if: contains(matrix.scenario, 'jks-') || matrix.scenario == 'cassandra-3.11' || matrix.scenario == 'default'
        run: molecule -v verify -s ${{ matrix.scenario }}
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ANSIBLE_ROLES_PATH: $GITHUB_WORKSPACE/roles
          MOLECULE_INSTANCE_NAME: cassandra-${{ matrix.scenario }}-${{ matrix.distro }}

      - name: Run Molecule idempotence
        if: contains(matrix.scenario, 'jks-') || matrix.scenario == 'cassandra-3.11' || matrix.scenario == 'default'
        run: molecule -v idempotence -s ${{ matrix.scenario }}
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ANSIBLE_ROLES_PATH: $GITHUB_WORKSPACE/roles
          MOLECULE_INSTANCE_NAME: cassandra-${{ matrix.scenario }}-${{ matrix.distro }}
