- name: Start or restart Cassandra and AxonOps Agent
  hosts: cassandra
  become: true
  # Default: rolling, one node at a time. For a non-default mass start (e.g. after
  # a multi-node OOM) set cassandra_start_serial: "100%" AND pass forks >= node
  # count (-f 12) so every node starts at once:
  #   ansible-playbook cassandra-rolling-start.yml -e cassandra_start_serial="100%" -f 12
  serial: "{{ cassandra_start_serial | default(1) }}"
  vars:
    state: started
  tasks:
    - name: Start Cassandra service
      ansible.builtin.service:
        name: cassandra
        state: "{{ state }}"

    - name: Start AxonOps Agent
      ansible.builtin.service:
        name: axon-agent
        state: "{{ state }}"

    - name: Wait for Cassandra to be up and running
      ansible.builtin.wait_for:
        port: 9042
        host: "{{ ansible_default_ipv4.address | default('localhost') }}"
        timeout: 300
        state: started

